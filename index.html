<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회사 소개 + 로또 추천</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="https://cdn-icons-png.flaticon.com/512/1047/1047711.png" alt="logo">
    <h1>우리 회사</h1>
    
    <p>최고의 서비스를 제공합니다</p>
    <a href="#lotto" class="cta-button">로또 번호 추천받기</a>
</header>

<nav>
    <a href="#about">회사 소개</a>
    <a href="#services">서비스</a>
    <a href="#lotto">로또 추천</a>
</nav>

<div class="container">
    <section id="about" class="section">
        <h2>회사 소개</h2>
        <p>우리 회사는 혁신적인 솔루션을 제공합니다.</p>
        <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80" alt="회사 이미지">
    </section>

    <section id="services" class="section">
        <h2>서비스</h2>
        <ul>
            <li>웹 개발</li>
            <li>앱 개발</li>
        </ul>
        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=800&q=80" alt="서비스 이미지">
    </section>

    <section id="lotto" class="section">
        <h2>로또 번호 추천</h2>
        <p>버튼을 누르면 랜덤 번호가 생성됩니다.</p>

        <button class="cta-button" onclick="generateLotto()">번호 생성</button>

        <div id="result" class="lotto-result"></div>

        <img src="https://images.unsplash.com/photo-1596524430615-b46475ddff6e?auto=format&fit=crop&w=800&q=80" alt="로또 이미지">
    </section>
</div>

<script src="script.js"></script>

</body>
</html>
