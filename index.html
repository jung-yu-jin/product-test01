<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회사 소개 + 로또 추천</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #eef5ff, #fdfbff);
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
        }
        header img {
            width: 80px;
            margin-bottom: 10px;
        }
        .cta-button {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: white;
            color: #2575fc;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        nav {
            background: white;
            padding: 0.8rem;
            text-align: center;
        }
        nav a {
            margin: 0 10px;
            text-decoration: none;
            color: #555;
        }
        .container {
            padding: 40px;
            max-width: 1000px;
            margin: auto;
        }
        .section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .section img {
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }
        .lotto-result {
            margin-top: 20px;
            text-align: center;
        }
        .ball {
            display: inline-block;
            width: 45px;
            height: 45px;
            line-height: 45px;
            border-radius: 50%;
            margin: 6px;
            font-weight: bold;
            color: white;
        }
        .yellow { background: #fbc400; }
        .blue { background: #69c8f2; }
        .red { background: #ff7272; }
        .gray { background: #aaa; }
        .green { background: #7bc043; }
    </style>
</head>
<body>

<header>
    <img src="https://cdn-icons-png.flaticon.com/512/1047/1047711.png" alt="logo">
    <h1>우리 회사</h1>
    
    <p>최고의 서비스를 제공합니다</p>
    <a href="#lotto" class="cta-button">로또 번호 추천받기</a>
</header>

<nav>
    <a href="#about">회사 소개</a>
    <a href="#services">서비스</a>
    <a href="#lotto">로또 추천</a>
</nav>

<div class="container">
    <section id="about" class="section">
        <h2>회사 소개</h2>
        <p>우리 회사는 혁신적인 솔루션을 제공합니다.</p>
        <img src="https://source.unsplash.com/800x400/?office" alt="회사 이미지">
    </section>

    <section id="services" class="section">
        <h2>서비스</h2>
        <ul>
            <li>웹 개발</li>
            <li>앱 개발</li>
        </ul>
        <img src="https://source.unsplash.com/800x400/?technology" alt="서비스 이미지">
    </section>

    <section id="lotto" class="section">
        <h2>로또 번호 추천</h2>
        <p>버튼을 누르면 랜덤 번호가 생성됩니다.</p>

        <button class="cta-button" onclick="generateLotto()">번호 생성</button>

        <div id="result" class="lotto-result"></div>

        <img src="https://source.unsplash.com/800x400/?lottery" alt="로또 이미지">
    </section>
</div>

<script>
function getColor(num) {
    if (num <= 10) return 'yellow';
    if (num <= 20) return 'blue';
    if (num <= 30) return 'red';
    if (num <= 40) return 'gray';
    return 'green';
}

function generateLotto() {
    let resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '';

    for (let i = 0; i < 5; i++) {
        let numbers = [];

        while (numbers.length < 6) {
            let num = Math.floor(Math.random() * 45) + 1;
            if (!numbers.includes(num)) numbers.push(num);
        }

        numbers.sort((a, b) => a - b);

        let line = '<div>';
        numbers.forEach(n => {
            let color = getColor(n);
            line += `<span class="ball ${color}">${n}</span>`;
        });
        line += '</div>';

        resultDiv.innerHTML += line;
    }
}
</script>

</body>
</html>
